name: Test Harness

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_gpu:
        description: "Run the manual GPU smoke job on a self-hosted NVIDIA runner"
        required: false
        default: false
        type: boolean

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check
      - name: Run tests (non-GPU)
        run: uv run pytest -m "not gpu" --ignore=tests/upstream -q
      - name: Collect bootstrap health report
        if: ${{ always() && matrix.python-version == '3.13' }}
        run: uv run python scripts/health.py --tier bootstrap --json > health-bootstrap-py${{ matrix.python-version }}.json
      - name: Collect contract health report
        if: ${{ always() && matrix.python-version == '3.13' }}
        run: uv run python scripts/health.py --tier contract --json > health-contract-py${{ matrix.python-version }}.json
      - name: Upload health artifacts
        if: ${{ always() && matrix.python-version == '3.13' }}
        uses: actions/upload-artifact@v4
        with:
          name: health-reports-cpu-py${{ matrix.python-version }}-${{ github.run_id }}
          path: |
            health-bootstrap-py${{ matrix.python-version }}.json
            health-contract-py${{ matrix.python-version }}.json

  gpu-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_gpu }}
    runs-on:
      - self-hosted
      - linux
      - x64
      - gpu
      - nvidia
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: Sync dependencies
        run: uv sync --group dev --extra cu12
      - name: Run GPU harness smoke
        run: uv run pytest --run-gpu tests/test_runtime_harness.py -m gpu
      - name: Collect GPU health report
        if: always()
        run: uv run python scripts/health.py --tier gpu --json > health-gpu.json
      - name: Upload GPU health artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-reports-gpu-${{ github.run_id }}
          path: health-gpu.json
