name: Test Harness

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_gpu:
        description: "Run the manual GPU smoke job on a self-hosted NVIDIA runner"
        required: false
        default: false
        type: boolean

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check
      - name: Run tests (non-GPU)
        run: uv run pytest -m "not gpu" --ignore=tests/upstream -q

  gpu-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_gpu }}
    runs-on:
      - self-hosted
      - linux
      - x64
      - gpu
      - nvidia
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --group dev --extra cu12
      - name: Run GPU harness smoke
        run: uv run pytest --run-gpu tests/test_runtime_harness.py -m gpu
