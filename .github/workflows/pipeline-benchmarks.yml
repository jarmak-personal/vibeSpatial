name: Pipeline Benchmarks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_gpu:
        description: "Run the manual GPU benchmark job on a self-hosted NVIDIA runner"
        required: false
        default: false
        type: boolean

jobs:
  pipeline-benchmarks-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Select suite
        id: suite
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "suite=ci" >> "$GITHUB_OUTPUT"
          else
            echo "suite=full" >> "$GITHUB_OUTPUT"
          fi
      - name: Resolve baseline SHA
        id: baseline
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            base_sha="${{ github.event.before }}"
          else
            base_sha=""
          fi
          echo "sha=$base_sha" >> "$GITHUB_OUTPUT"
      - name: Sync dependencies
        run: uv sync --group dev --group upstream-optional
      - name: Run current pipeline suite
        run: uv run python scripts/benchmark_pipelines.py --suite "${{ steps.suite.outputs.suite }}" --repeat 3 --output pipeline-current.json
      - name: Run baseline pipeline suite
        id: baseline_run
        shell: bash
        run: |
          set -euo pipefail
          base_sha="${{ steps.baseline.outputs.sha }}"
          if [ -z "$base_sha" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            printf '{\n  "note": "no baseline sha available for this event"\n}\n' > pipeline-baseline.json
            exit 0
          fi

          worktree_dir="$RUNNER_TEMP/pipeline-benchmark-baseline"
          rm -rf "$worktree_dir"
          git worktree add --detach "$worktree_dir" "$base_sha"
          if [ ! -f "$worktree_dir/scripts/benchmark_pipelines.py" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            printf '{\n  "note": "baseline commit predates pipeline benchmark rails"\n}\n' > pipeline-baseline.json
            exit 0
          fi

          (
            cd "$worktree_dir"
            uv sync --group dev --group upstream-optional
            uv run python scripts/benchmark_pipelines.py --suite "${{ steps.suite.outputs.suite }}" --repeat 3 --output "$GITHUB_WORKSPACE/pipeline-baseline.json"
          )
          echo "available=true" >> "$GITHUB_OUTPUT"
      - name: Compare current vs baseline
        id: compare
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.baseline_run.outputs.available }}" != "true" ]; then
            printf '{\n  "note": "baseline comparison unavailable"\n}\n' > pipeline-comparison.json
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          set +e
          uv run python scripts/check_pipeline_regressions.py --baseline pipeline-baseline.json --current pipeline-current.json > pipeline-comparison.json
          status=$?
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
      - name: Upload pipeline benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-benchmarks-cpu-${{ github.run_id }}
          path: |
            pipeline-current.json
            pipeline-baseline.json
            pipeline-comparison.json
      - name: Fail on regression
        if: steps.compare.outputs.exit_code != '0'
        run: exit 1

  pipeline-benchmarks-gpu:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_gpu }}
    runs-on:
      - self-hosted
      - linux
      - x64
      - gpu
      - nvidia
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --group dev --group upstream-optional --extra cu12
      - name: Resolve baseline SHA
        id: baseline
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=$(git rev-parse HEAD^ 2>/dev/null || true)" >> "$GITHUB_OUTPUT"
          else
            echo "sha=" >> "$GITHUB_OUTPUT"
          fi
      - name: Run current GPU pipeline suite
        run: uv run python scripts/benchmark_pipelines.py --suite full --repeat 3 --nvtx --output pipeline-gpu-current.json
      - name: Run baseline GPU pipeline suite
        id: baseline_run
        shell: bash
        run: |
          set -euo pipefail
          base_sha="${{ steps.baseline.outputs.sha }}"
          if [ -z "$base_sha" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            printf '{\n  "note": "no baseline sha available for GPU workflow"\n}\n' > pipeline-gpu-baseline.json
            exit 0
          fi

          worktree_dir="$RUNNER_TEMP/pipeline-benchmark-gpu-baseline"
          rm -rf "$worktree_dir"
          git worktree add --detach "$worktree_dir" "$base_sha"
          if [ ! -f "$worktree_dir/scripts/benchmark_pipelines.py" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            printf '{\n  "note": "baseline commit predates pipeline benchmark rails"\n}\n' > pipeline-gpu-baseline.json
            exit 0
          fi

          (
            cd "$worktree_dir"
            uv sync --group dev --group upstream-optional --extra cu12
            uv run python scripts/benchmark_pipelines.py --suite full --repeat 3 --nvtx --output "$GITHUB_WORKSPACE/pipeline-gpu-baseline.json"
          )
          echo "available=true" >> "$GITHUB_OUTPUT"
      - name: Compare current vs baseline
        id: compare
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.baseline_run.outputs.available }}" != "true" ]; then
            printf '{\n  "note": "baseline comparison unavailable"\n}\n' > pipeline-gpu-comparison.json
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          set +e
          uv run python scripts/check_pipeline_regressions.py --baseline pipeline-gpu-baseline.json --current pipeline-gpu-current.json > pipeline-gpu-comparison.json
          status=$?
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
      - name: Upload GPU pipeline benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-benchmarks-gpu-${{ github.run_id }}
          path: |
            pipeline-gpu-current.json
            pipeline-gpu-baseline.json
            pipeline-gpu-comparison.json
      - name: Fail on regression
        if: steps.compare.outputs.exit_code != '0'
        run: exit 1
