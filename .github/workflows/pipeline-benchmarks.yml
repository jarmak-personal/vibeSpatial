name: Pipeline Benchmarks

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Benchmark suite to run"
        required: false
        default: "full"
        type: choice
        options:
          - smoke
          - ci
          - full
      run_gpu:
        description: "Run the GPU benchmark job on a self-hosted NVIDIA runner"
        required: false
        default: false
        type: boolean

jobs:
  pipeline-benchmarks-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: Sync dependencies
        run: uv sync --group dev --group upstream-optional
      - name: Run current pipeline suite
        run: uv run python scripts/benchmark_pipelines.py --suite "${{ inputs.suite }}" --repeat 3 --output pipeline-current.json
      - name: Upload pipeline benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-benchmarks-cpu-${{ github.run_id }}
          path: pipeline-current.json

  pipeline-benchmarks-gpu:
    if: ${{ inputs.run_gpu }}
    runs-on:
      - self-hosted
      - linux
      - x64
      - gpu
      - nvidia
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: Sync dependencies
        run: uv sync --group dev --group upstream-optional --extra cu12
      - name: Run GPU pipeline suite
        run: uv run python scripts/benchmark_pipelines.py --suite "${{ inputs.suite }}" --repeat 3 --nvtx --output pipeline-gpu-current.json
      - name: Upload GPU pipeline benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-benchmarks-gpu-${{ github.run_id }}
          path: pipeline-gpu-current.json
